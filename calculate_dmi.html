<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>干物质采食量计算</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .result { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
        .step { margin: 5px 0; }
    </style>
</head>
<body>
    <h1>干物质采食量计算</h1>
    <div class="result">
        <h2>计算参数</h2>
        <div class="step">体重 (LBW): 400 kg</div>
        <div class="step">日增重 (ADG): 1.5 kg/d</div>
        
        <h2>计算过程</h2>
        <div class="step">1. 计算 LBW^0.75: Math.pow(400, 0.75) = <span id="lbw75"></span></div>
        <div class="step">2. 计算第一部分: 0.062 × LBW^0.75 = <span id="part1"></span></div>
        <div class="step">3. 计算第二部分: 1.5296 + 0.0037 × LBW = <span id="part2"></span></div>
        <div class="step">4. 计算第二部分×ADG: 第二部分 × 1.5 = <span id="part2adg"></span></div>
        <div class="step">5. 总干物质采食量: 第一部分 + 第二部分×ADG = <span id="total"></span></div>
        
        <h2>计算结果</h2>
        <div class="step">干物质采食量 (DMI): <span id="result"></span> kg/d</div>
    </div>
    
    <script>
        const bodyWeight = 400;
        const dailyGain = 1.5;
        
        // 计算各个部分
        const lbw75 = Math.pow(bodyWeight, 0.75);
        const part1 = 0.062 * lbw75;
        const part2 = 1.5296 + 0.0037 * bodyWeight;
        const part2adg = part2 * dailyGain;
        const totalDMI = part1 + part2adg;
        
        // 显示结果
        document.getElementById('lbw75').textContent = lbw75.toFixed(4);
        document.getElementById('part1').textContent = part1.toFixed(4);
        document.getElementById('part2').textContent = part2.toFixed(4);
        document.getElementById('part2adg').textContent = part2adg.toFixed(4);
        document.getElementById('total').textContent = totalDMI.toFixed(4);
        document.getElementById('result').textContent = totalDMI.toFixed(2);
        
        console.log('计算结果:', totalDMI);
    </script>
</body>
</html>
